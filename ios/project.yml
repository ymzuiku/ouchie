name: Ouchie
options:
  bundleIdPrefix: com.ymzuiku
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AppShell:
    path: ../../app-shell/ios

targets:
  Ouchie:
    type: application
    platform: iOS
    sources:
      - path: Ouchie
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Ouchie/Resources
    dependencies:
      - package: AppShell
    settings:
      base:
        DEVELOPMENT_TEAM: QUKNH2D57C
        INFOPLIST_FILE: Ouchie/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ymzuiku.ouchie
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Ouchie/Info.plist
      properties:
        CFBundleDisplayName: Ouchie
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSMotionUsageDescription: "Used to detect slaps and play audio responses."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
